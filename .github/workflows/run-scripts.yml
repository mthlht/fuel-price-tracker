name: Run Python scripts hourly

on:
  schedule:
    - cron: "0 * * * *"   # toutes les heures
  workflow_dispatch:

permissions:
  contents: write   # 🔑 nécessaire pour push

jobs:
  run-scripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 🔧 important pour éviter certains soucis de push

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data download script
        run: |
          python script/data-download.py

      - name: Run data handler script
        run: |
          python script/data-handler.py

      # ✅ Commit & push automatique
      - name: Commit and push generated files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Ajouter uniquement ton dossier de sortie
          git add data/fuel-prices-csv/*.csv

          # Commit seulement si changements
          git diff --cached --quiet || git commit -m "Update fuel price CSV files"

          git push