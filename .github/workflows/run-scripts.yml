name: Run Python scripts periodically (test)

on:
  schedule:
    - cron: "0 * * * *"   # toutes les heures
  workflow_dispatch:

permissions:
  contents: write   # 🔑 nécessaire pour push

jobs:
  run-scripts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 🔧 important pour éviter certains soucis de push

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data download script
        run: |
          python script/data-download.py

      - name: Run data download instant script
        run: |
          python script/data-download-instant.py

      - name: Run data handler script
        run: |
          python script/data-handler.py
      
      - name: Run shortage download script
        run: |
          python script/shortage-download.py
        
      - name: Run shortage instant download script
        run: |
          python script/shortage-download-instant.py
          
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
      
      - name: Install R packages
        run: |
          Rscript -e 'install.packages(c("dplyr", "readr", "magrittr", "lubridate", "tidyr", "purrr"), repos="https://cloud.r-project.org")'

      - name: Run R script
        run: |
          Rscript script/shortage-handler.R

      # ✅ Commit & push automatique
      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      
          # Ajouter les fichiers
          git add data/
      
          # Commit seulement si changements
          if ! git diff --cached --quiet; then
            git commit -m "Update data"
            git push origin main
          else
            echo "No changes to commit"
          fi